name: build-image

# Assemble the cppmega runtime image from the prebuilt wheel release and push
# to ghcr.io/jewelmusicee/cppmega:<sha>. Buildx registry cache lives in the same
# repo so re-runs after a fix start from the last good layer, never from scratch.

on:
  workflow_dispatch:
    inputs:
      wheels_tag:
        description: "Wheel release tag (without 'wheels-' prefix). Empty = latest."
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - .github/workflows/build-image.yml
      - cppmega/**
      - scripts/cppmega_fp8_shim.py
      - pyproject.toml
  workflow_run:
    workflows: [build-wheels]
    types: [completed]

permissions:
  contents: read
  packages: write   # ghcr.io push

env:
  IMAGE: ghcr.io/jewelmusicee/cppmega

jobs:
  image:
    if: |
      github.repository == 'jewelmusicee/cppmega' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Resolve wheel release tag
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ inputs.wheels_tag }}" ]]; then
            TAG="wheels-${{ inputs.wheels_tag }}"
          else
            TAG=$(gh release list --limit 50 --json tagName --jq '.[].tagName' \
                  | grep '^wheels-' | head -1)
          fi
          if [[ -z "$TAG" ]]; then
            echo "No wheel release found — run build-wheels.yml first." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using wheel release: $TAG"

      - name: Download wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p wheels
          gh release download "${{ steps.rel.outputs.tag }}" --dir wheels --pattern '*.whl'
          ls -lh wheels/

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=wheels-${{ steps.rel.outputs.tag }}

      - name: Build & push (cache to/from registry)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
          provenance: false   # cleaner package listing in ghcr UI
