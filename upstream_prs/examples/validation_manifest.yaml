# Validation manifest for upstream PR reproducer packs.
#
# Schema:
#   prs:
#     "<pack_id>":
#       local_path: path to primary reproducer (repo-relative)
#       last_verified:
#         host: machine name (bench3|europe|gb10|mac-local|...)
#         date: YYYY-MM-DD
#         process_exit_code: actual integer returned by `python reproducer.py; echo $?`
#                            Do NOT rewrite. Some reproducers intentionally
#                            return 1 when the bug is present (that IS the
#                            success signal for a bug-proof reproducer).
#         semantic_verdict: one of
#             * bug_reproduced_and_fix_validated — reproducer printed its
#               expected verdict for its pack type; may pair with
#               process_exit_code=0 OR 1 depending on whether the reproducer
#               treats "bug still present" as a success exit
#             * bug_not_present_anymore — upstream or local fix has landed
#               and reproducer no longer asserts the bug
#             * install_error — reproducer failed to run (missing dep, CUDA
#               unavailable on a CUDA-only reproducer, import error, ...)
#             * pending — reproducer exists but has not been run on the
#               listed host this session
#         output_tags: list of semantic markers printed by reproducer
#                      (e.g. BUG_REPRODUCED, FIX_VALIDATED, LEGALITY_PROVED,
#                      BITWISE_IDENTICAL, REGRESSION_TEST_PASSED,
#                      BLOCKED, SKIPPED)
#         log_location: repo-relative path to the captured run log, or null
#                       if no log was retained
#         log_sha256: sha256 of the captured log file, or null if not captured
#         verification_source: receipted_log | reported_by_agent | pending
#             * receipted_log         — log exists on disk at log_location
#             * reported_by_agent     — pack was verified inside an agent
#                                       session transcript but no log was
#                                       retained; text-only claim
#             * pending               — reproducer exists but has not been
#                                       run on listed host this session
#         notes: optional free-form caveats
#       upstream_status:
#         repo: github owner/name
#         issue_or_pr: issue/PR number filed upstream, or null
#         state: new_report | open | draft | merged | closed | not_filed
#         verified_via: how upstream state was checked (e.g. "gh api", null)
#
# Exit-code honesty policy (2026-04-14 audit):
# Two legitimate success states exist — DO NOT collapse them:
#
#   (a) process_exit_code=0 + semantic_verdict=bug_reproduced_and_fix_validated
#       Reproducer treats "all checks passed (bug seen, fix validated)" as 0.
#       Packs: 01, 03, 04, 05, 07, 08, 11, 12.
#
#   (b) process_exit_code=1 + semantic_verdict=bug_reproduced_and_fix_validated
#       Reproducer intentionally returns 1 when the bug IS present (that is
#       the assertion it wants to signal — the run proved the bug exists).
#       Packs: 02, 09, 13. Their `sys.exit(main())` pattern returns 1 on the
#       bug-present branch by design; rewriting this to 0 would be
#       outcome-rewriting, not outcome-recording.
#
# Never rewrite an intentional-1 as 0. If a reproducer changes its exit
# convention, update BOTH the reproducer and this manifest together.
#
# Receipt honesty policy (2026-04-14 audit):
# Only pack 12 has a retained log file (run_gb10.log, sha256 recorded below).
# All other packs were verified inside agent session reports without
# saving stdout/stderr, so their last_verified.verification_source is
# "reported_by_agent" and their log_location is null. Treat these as
# claimed-but-unreceipted until a receipted log is captured.
#
# Pack 10 stays "pending" on mac-local (no CUDA cc=9 locally).

